databases:
  - name: data-app-db
    plan: free

services:
  - type: web
    name: data-app-backend
    env: python
    plan: free
    buildCommand: "./build.sh"
    startCommand: "gunicorn config.wsgi:application"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: data-app-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: PYTHON_VERSION
        value: 3.10.12
      - key: PRODUCTION
        value: "True"
      - key: DEBUG
        value: "False"
      - key: WEB_CONCURRENCY
        value: "4"
      - key: DJANGO_ALLOWED_HOSTS
        value: "data-app-backend.onrender.com"
      - key: CSRF_TRUSTED_ORIGINS
        value: "https://data-app-backend.onrender.com"

      # Core Provider Integration API Keys (You must fill these in the dashboard securely)
      - key: PAYSTACK_SECRET_KEY
        sync: false
      - key: MONNIFY_BASE_URL
        sync: false
      - key: MONNIFY_API_KEY
        sync: false
      - key: MONNIFY_API_SECRET
        sync: false
      - key: MONNIFY_CONTRACT_CODE
        sync: false
      - key: MONNIFY_WEBHOOK_SECRET
        sync: false
      - key: VTPASS_BASE_URL
        sync: false
      - key: VTPASS_API_KEY
        sync: false
      - key: VTPASS_API_SECRET
        sync: false
      - key: VTPASS_API_PUBLIC_KEY
        sync: false
      - key: CLUBKONNECT_USER_ID
        sync: false
      - key: CLUBKONNECT_API_KEY
        sync: false
      - key: TERMII_API_KEY
        sync: false
      - key: TERMII_SENDER_ID
        sync: false
      - key: TERMII_EMAIL_CONFIG_ID
        sync: false
      - key: TWILIO_ACCOUNT_SID
        sync: false
      - key: TWILIO_AUTH_TOKEN
        sync: false
      - key: TWILIO_SMS_NUMBER
        sync: false
      - key: TWILIO_WHATSAPP_NUMBER
        sync: false
      - key: TWILIO_EMAIL
        sync: false
      - key: FIREBASE_TYPE
        sync: false
      - key: FIREBASE_PROJECT_ID
        sync: false
      - key: FIREBASE_PRIVATE_KEY_ID
        sync: false
      - key: FIREBASE_PRIVATE_KEY
        sync: false
      - key: FIREBASE_CLIENT_EMAIL
        sync: false
      - key: FIREBASE_CLIENT_ID
        sync: false
      - key: FIREBASE_AUTH_URI
        sync: false
      - key: FIREBASE_TOKEN_URI
        sync: false
      - key: FIREBASE_AUTH_PROVIDER_X509_CERT_URL
        sync: false
      - key: FIREBASE_CLIENT_X509_CERT_URL
        sync: false
      - key: FIREBASE_UNIVERSE_DOMAIN
        sync: false
      - key: ZOHO_EMAIL_USER
        sync: false
      - key: ZOHO_MAIL_API_URL
        sync: false
      - key: ZOHO_SMS_SENDER_ID
        sync: false
      - key: ZOHO_WHATSAPP_NUMBER
        sync: false
      - key: ZOHO_API_KEY
        sync: false
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false

